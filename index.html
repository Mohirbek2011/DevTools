<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/public/site-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DevTools</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/eslint/8.53.0/eslint.min.js"></script>
    <script>
      async function lintCode() {
        const code = `const x = 5 console.log(x);`; // Ошибочный код
        const eslint = new eslint.Linter();
        const messages = eslint.verify(code, { env: { browser: true }, rules: { semi: ["error", "always"] } });
        
        console.log(messages); // Выведет ошибки в консоль
      }
    
      lintCode();
    </script>
  </body>


</html>
